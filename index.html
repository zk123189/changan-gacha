<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>长安汉服出片扭蛋机</title>
<style>
/* ============================================================
   CSS Custom Properties — 新中式国潮配色系统
   ============================================================ */
:root {
  --red:       #FF461F;
  --red-dark:  #D93A16;
  --yellow:    #FFB61E;
  --gold:      #D4A84B;
  --gold-light:#F5E6C8;
  --navi-blue: #1678FF;
  --bg-paper:  #F5F0E8;
  --ink:       #3D2B1F;
  --ink-light: #6B5A4E;
  --white:     #FFFEF9;
  --shadow:    0 4px 20px rgba(61,43,31,0.12);
  --shadow-lg: 0 12px 40px rgba(61,43,31,0.18);
  --radius:    12px;
  --radius-lg: 20px;
  --font-serif: "Noto Serif SC", "Source Han Serif SC", "STSong", "SimSun", "KaiTi", serif;
  --font-display: "Noto Serif SC", "STZhongsong", "SimSun", "KaiTi", serif;
}

/* ============================================================
   Reset & Base
   ============================================================ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html {
  font-size: 16px;
  -webkit-text-size-adjust: 100%;
  -webkit-tap-highlight-color: transparent;
  scroll-behavior: smooth;
}

body {
  font-family: var(--font-serif);
  background-color: #EDE8DC;
  color: var(--ink);
  min-height: 100vh;
  min-height: 100dvh;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  overflow-x: hidden;
  /* 宣纸纹理：多层径向渐变模拟纤维 + 细微噪点 */
  background-image:
    radial-gradient(ellipse at 20% 50%, rgba(139,119,90,0.06) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 20%, rgba(139,119,90,0.04) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 80%, rgba(139,119,90,0.05) 0%, transparent 55%),
    radial-gradient(circle at 30% 30%, rgba(200,180,140,0.08) 0%, transparent 40%),
    radial-gradient(circle at 70% 70%, rgba(200,180,140,0.06) 0%, transparent 40%),
    repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(180,160,120,0.03) 2px, rgba(180,160,120,0.03) 4px);
  background-attachment: fixed;
}

/* ============================================================
   Main Container
   ============================================================ */
.container {
  width: 100%;
  max-width: 430px;
  min-height: 100vh;
  min-height: 100dvh;
  padding: 24px 16px 40px;
  display: flex;
  flex-direction: column;
  align-items: center;
  position: relative;
}

/* ============================================================
   Header
   ============================================================ */
.header {
  text-align: center;
  padding: 16px 0 8px;
}

.header .title {
  font-family: var(--font-display);
  font-size: clamp(28px, 7vw, 36px);
  font-weight: 700;
  color: var(--red);
  letter-spacing: 4px;
  text-shadow: 1px 1px 0 rgba(255,182,30,0.3);
  line-height: 1.3;
}

.header .subtitle {
  font-size: clamp(13px, 3.5vw, 15px);
  color: var(--ink-light);
  letter-spacing: 6px;
  margin-top: 8px;
}

.header .divider {
  width: 60px;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  margin: 12px auto 0;
  border-radius: 1px;
}

/* ============================================================
   Gacha Stage — 扭蛋机主舞台
   ============================================================ */
.gacha-stage {
  position: relative;
  width: 100%;
  max-width: 340px;
  height: 320px;
  margin: 20px auto 8px;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* --- Gacha Machine Body --- */
.gacha-machine {
  position: relative;
  width: 200px;
  height: 240px;
  z-index: 2;
  cursor: default;
}

/* 底座 */
.gacha-base {
  position: absolute;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 180px;
  height: 24px;
  background: linear-gradient(180deg, #C8963E 0%, #8B6914 40%, #A07828 100%);
  border-radius: 8px 8px 20px 20px;
  box-shadow: 0 4px 12px rgba(61,43,31,0.25);
}

/* 主体签筒 */
.gacha-body {
  position: absolute;
  bottom: 18px;
  left: 50%;
  transform: translateX(-50%);
  width: 150px;
  height: 190px;
  background: linear-gradient(180deg,
    var(--red) 0%,
    #E83A18 15%,
    var(--red-dark) 50%,
    #C42E10 85%,
    #8B1A08 100%);
  border-radius: 18px 18px 24px 24px;
  box-shadow:
    inset 0 2px 0 rgba(255,255,255,0.15),
    inset 0 -4px 8px rgba(0,0,0,0.2),
    0 8px 24px rgba(61,43,31,0.3);
  overflow: hidden;
}

/* 签筒装饰纹 */
.gacha-body::before {
  content: '';
  position: absolute;
  top: 16px; left: 10px; right: 10px; bottom: 16px;
  border: 2px solid rgba(255,182,30,0.4);
  border-radius: 10px;
  pointer-events: none;
}

/* 签筒装饰菱形 */
.gacha-body::after {
  content: '';
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%) rotate(45deg);
  width: 40px; height: 40px;
  border: 2px solid rgba(255,182,30,0.5);
  border-radius: 4px;
  pointer-events: none;
}

/* 签筒窗口 */
.gacha-window {
  position: absolute;
  top: 40px;
  left: 50%;
  transform: translateX(-50%);
  width: 80px;
  height: 80px;
  background: radial-gradient(circle, rgba(255,255,255,0.15) 0%, rgba(0,0,0,0.3) 100%);
  border-radius: 50%;
  border: 3px solid var(--gold);
  box-shadow:
    inset 0 0 20px rgba(255,182,30,0.3),
    0 0 15px rgba(255,182,30,0.4);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 3;
}

.gacha-window-inner {
  font-size: 36px;
  animation: windowGlow 2s ease-in-out infinite;
}

@keyframes windowGlow {
  0%, 100% { filter: brightness(1); }
  50% { filter: brightness(1.4) drop-shadow(0 0 6px rgba(255,182,30,0.8)); }
}

/* 顶部旋钮 */
.gacha-knob {
  position: absolute;
  top: 8px;
  left: 50%;
  transform: translateX(-50%);
  width: 44px;
  height: 44px;
  background: radial-gradient(circle at 40% 35%, #F5E6C8, #D4A84B 60%, #8B6914 100%);
  border-radius: 50%;
  box-shadow: 0 4px 10px rgba(61,43,31,0.3);
  z-index: 4;
}

.gacha-knob::after {
  content: '';
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 12px; height: 12px;
  background: var(--red-dark);
  border-radius: 50%;
}

/* 侧面把手 */
.gacha-handle {
  position: absolute;
  right: 8px;
  top: 50%;
  transform: translateY(-50%);
  width: 28px;
  height: 56px;
  z-index: 5;
}

.gacha-handle::before {
  content: '';
  position: absolute;
  top: 0; left: 50%;
  transform: translateX(-50%);
  width: 8px;
  height: 20px;
  background: linear-gradient(180deg, #D4A84B, #8B6914);
  border-radius: 4px;
}

.gacha-handle::after {
  content: '';
  position: absolute;
  bottom: 0; left: 50%;
  transform: translateX(-50%);
  width: 28px;
  height: 28px;
  background: radial-gradient(circle at 40% 35%, #F5E6C8, #D4A84B 60%, #8B6914 100%);
  border-radius: 50%;
  box-shadow: 0 3px 8px rgba(61,43,31,0.3);
}

/* 出签口 */
.gacha-chute {
  position: absolute;
  bottom: 38px;
  left: 50%;
  transform: translateX(-50%);
  width: 60px;
  height: 18px;
  background: linear-gradient(180deg, #3D1A0A, #1A0804);
  border-radius: 0 0 10px 10px;
  z-index: 3;
}

/* --- Petal Layer --- */
.petal-layer {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 1;
  overflow: hidden;
}

.petal {
  position: absolute;
  top: -20px;
  width: 14px;
  height: 14px;
  background: radial-gradient(circle at 30% 30%, #FFB6C1, #FF69B4 60%, #E75480 100%);
  border-radius: 50% 0 50% 50%;
  opacity: 0;
  animation: petalFall var(--fall-duration, 3s) var(--fall-delay, 0s) ease-in forwards;
  --sway: 30px;
}

.petal.gold {
  background: radial-gradient(circle at 30% 30%, #FFE4A0, #FFB61E 60%, #D4A84B 100%);
}

.petal.pink {
  background: radial-gradient(circle at 30% 30%, #FFD0D8, #FF8098 60%, #D9466A 100%);
}

@keyframes petalFall {
  0% {
    opacity: 1;
    transform: translateY(0) translateX(0) rotate(0deg) scale(1);
  }
  25% {
    transform: translateY(80px) translateX(var(--sway, 20px)) rotate(90deg) scale(0.9);
  }
  50% {
    transform: translateY(180px) translateX(calc(var(--sway, 20px) * -0.5)) rotate(200deg) scale(0.8);
  }
  75% {
    transform: translateY(260px) translateX(calc(var(--sway, 20px) * 0.7)) rotate(300deg) scale(0.5);
  }
  100% {
    opacity: 0;
    transform: translateY(340px) translateX(0) rotate(420deg) scale(0.15);
  }
}

/* --- Sparkle Layer --- */
.sparkle-layer {
  position: absolute;
  inset: -40px;
  pointer-events: none;
  z-index: 4;
}

.sparkle {
  position: absolute;
  width: 6px;
  height: 6px;
  background: #FFD700;
  border-radius: 50%;
  opacity: 0;
  animation: sparkle 0.8s ease-out forwards;
  box-shadow: 0 0 6px 2px rgba(255,215,0,0.8);
}

.sparkle.white {
  background: #FFF;
  box-shadow: 0 0 8px 2px rgba(255,255,255,0.9);
}

.sparkle.gold {
  background: #FFB61E;
  box-shadow: 0 0 6px 2px rgba(255,182,30,0.8);
}

@keyframes sparkle {
  0% {
    opacity: 0;
    transform: scale(0) translate(0, 0);
  }
  30% {
    opacity: 1;
    transform: scale(1.8) translate(var(--sx, 10px), var(--sy, -10px));
  }
  100% {
    opacity: 0;
    transform: scale(0) translate(var(--ex, 40px), var(--ey, -60px));
  }
}

/* ============================================================
   Draw Button
   ============================================================ */
.draw-btn-wrap {
  position: relative;
  z-index: 5;
  margin: 4px 0 16px;
}

.draw-btn {
  display: inline-block;
  padding: 16px 48px;
  font-family: var(--font-display);
  font-size: clamp(18px, 5vw, 22px);
  font-weight: 700;
  letter-spacing: 4px;
  color: var(--white);
  background: linear-gradient(135deg, var(--red) 0%, #E83A18 50%, var(--red-dark) 100%);
  border: none;
  border-radius: 50px;
  box-shadow:
    0 6px 24px rgba(255,70,31,0.4),
    inset 0 1px 0 rgba(255,255,255,0.2);
  cursor: pointer;
  animation: btnPulse 2.5s ease-in-out infinite;
  transition: transform 0.15s ease;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  -webkit-user-select: none;
  position: relative;
  overflow: hidden;
}

/* 按钮金色描边 */
.draw-btn::before {
  content: '';
  position: absolute;
  inset: -3px;
  border-radius: 53px;
  background: linear-gradient(135deg, var(--yellow), var(--gold), var(--yellow), var(--gold-light), var(--yellow));
  background-size: 300% 300%;
  z-index: -1;
  animation: goldShimmer 3s linear infinite;
}

.draw-btn::after {
  content: '';
  position: absolute;
  inset: 2px;
  border-radius: 50px;
  background: linear-gradient(135deg, var(--red) 0%, var(--red-dark) 100%);
  z-index: -1;
}

@keyframes btnPulse {
  0%, 100% {
    box-shadow: 0 6px 24px rgba(255,70,31,0.4), inset 0 1px 0 rgba(255,255,255,0.2);
  }
  50% {
    box-shadow: 0 8px 36px rgba(255,70,31,0.65), inset 0 1px 0 rgba(255,255,255,0.25), 0 0 0 8px rgba(255,182,30,0.12);
  }
}

@keyframes goldShimmer {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

.draw-btn:active {
  transform: scale(0.95);
}

.draw-btn:disabled {
  opacity: 0.6;
  cursor: not-allowed;
  animation: none;
}

/* 按钮下方提示 */
.draw-hint {
  text-align: center;
  font-size: 12px;
  color: var(--ink-light);
  letter-spacing: 2px;
  margin-top: 8px;
}

/* ============================================================
   Count Badge
   ============================================================ */
.count-badge {
  font-size: 12px;
  color: var(--ink-light);
  text-align: center;
  margin-bottom: 8px;
  letter-spacing: 1px;
}

.count-badge span {
  color: var(--red);
  font-weight: 700;
}

/* ============================================================
   Card Modal
   ============================================================ */
.card-modal {
  position: fixed;
  inset: 0;
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(30,20,10,0.75);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.35s ease;
  padding: 20px;
}

.card-modal.active {
  opacity: 1;
  pointer-events: auto;
}

/* 卡片容器 */
.card-wrapper {
  width: 100%;
  max-width: 360px;
  max-height: 85vh;
  max-height: 85dvh;
  overflow-y: auto;
  transform: scale(0.3);
  opacity: 0;
  transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.4s ease;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}

.card-wrapper::-webkit-scrollbar { display: none; }

.card-modal.active .card-wrapper {
  transform: scale(1);
  opacity: 1;
}

/* 卡片内芯 */
.card {
  background: var(--white);
  background-image:
    radial-gradient(ellipse at 30% 20%, rgba(212,168,75,0.06) 0%, transparent 50%),
    radial-gradient(ellipse at 70% 80%, rgba(212,168,75,0.04) 0%, transparent 50%);
  border-radius: var(--radius-lg);
  padding: 28px 24px 20px;
  box-shadow: var(--shadow-lg), 0 0 0 1px rgba(212,168,75,0.15);
  position: relative;
  overflow: hidden;
}

/* 卡片顶部装饰线 */
.card::before {
  content: '';
  position: absolute;
  top: 0; left: 24px; right: 24px;
  height: 3px;
  background: linear-gradient(90deg, transparent, var(--red), var(--yellow), var(--red), transparent);
  border-radius: 0 0 2px 2px;
}

/* 卡片角花 */
.card::after {
  content: '❖';
  position: absolute;
  bottom: 12px;
  right: 18px;
  font-size: 10px;
  color: var(--gold);
  opacity: 0.4;
}

/* --- 人设标签 --- */
.card-persona {
  text-align: center;
  margin-bottom: 20px;
  padding-top: 4px;
}

.card-persona .label {
  display: inline-block;
  font-family: var(--font-display);
  font-size: clamp(26px, 7vw, 34px);
  font-weight: 700;
  color: var(--red);
  letter-spacing: 4px;
  padding: 6px 24px;
  border: 2px solid var(--red);
  border-radius: 6px;
  background: linear-gradient(180deg, rgba(255,70,31,0.04) 0%, transparent 100%);
  position: relative;
}

.card-persona .label::before,
.card-persona .label::after {
  content: '◆';
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  font-size: 8px;
  color: var(--gold);
}

.card-persona .label::before { left: -14px; }
.card-persona .label::after  { right: -14px; }

.card-persona .role-tag {
  display: block;
  font-size: 12px;
  color: var(--gold);
  letter-spacing: 6px;
  margin-top: 6px;
}

/* --- 拍照姿势 --- */
.card-section {
  margin-bottom: 16px;
}

.card-section .section-title {
  font-family: var(--font-display);
  font-size: 14px;
  font-weight: 700;
  color: var(--gold);
  letter-spacing: 3px;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.card-section .section-title::after {
  content: '';
  flex: 1;
  height: 1px;
  background: linear-gradient(90deg, var(--gold), transparent);
}

.card-poses {
  list-style: none;
  padding: 0;
}

.card-poses li {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 12px 0;
  font-size: 13px;
  line-height: 1.8;
  color: var(--ink);
  border-bottom: 1px dashed rgba(212,168,75,0.25);
}

.card-poses li:last-child { border-bottom: none; }

/* 姿势插画容器 — 相纸卡片风格 */
.pose-illustration {
  flex-shrink: 0;
  width: 90px;
  height: 120px;
  border-radius: 10px;
  background: var(--white);
  border: 2px solid rgba(212,168,75,0.35);
  box-shadow:
    0 2px 10px rgba(61,43,31,0.10),
    inset 0 0 0 3px var(--white);
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* 移除旧的内发光叠加层 — 新SVG自带背景 */
.pose-illustration::after { content: none; }

.pose-illustration svg {
  width: 82px;
  height: 112px;
  filter: drop-shadow(1px 2px 3px rgba(61,43,31,0.12));
  border-radius: 4px;
}

/* 外部图片支持（未来可替换为真人照片） */
.pose-illustration img {
  width: 82px;
  height: 112px;
  object-fit: cover;
  border-radius: 4px;
}

/* 姿势文字区 */
.pose-text-wrap {
  flex: 1;
  min-width: 0;
}

.pose-text-wrap .pose-num {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 18px;
  height: 18px;
  background: var(--red);
  color: var(--white);
  font-size: 10px;
  font-weight: 700;
  border-radius: 50%;
  line-height: 1;
  margin-right: 6px;
  vertical-align: middle;
  position: relative;
  top: -1px;
}

.pose-text-wrap .pose-desc {
  color: var(--ink);
}

/* --- 情绪口诀 --- */
.card-mantra {
  background: linear-gradient(135deg, rgba(255,70,31,0.06), rgba(255,182,30,0.08));
  border-left: 3px solid var(--red);
  border-radius: 0 8px 8px 0;
  padding: 14px 16px;
  margin-bottom: 16px;
  text-align: center;
}

.card-mantra .mantra-text {
  font-family: var(--font-display);
  font-size: clamp(16px, 4.5vw, 20px);
  font-weight: 700;
  color: var(--red-dark);
  letter-spacing: 2px;
}

.card-mantra .mantra-label {
  font-size: 11px;
  color: var(--ink-light);
  letter-spacing: 3px;
  margin-bottom: 4px;
}

/* --- 出片机位 --- */
.card-location {
  margin-bottom: 16px;
}

.card-location .loc-detail {
  font-size: 13px;
  line-height: 1.7;
  color: var(--ink);
  padding: 4px 0;
}

.card-location .loc-tip {
  display: inline-block;
  font-size: 12px;
  color: var(--ink-light);
  background: rgba(212,168,75,0.12);
  padding: 4px 10px;
  border-radius: 4px;
  margin-top: 4px;
}

/* --- 高德导航区域 --- */
.card-navi {
  background: linear-gradient(135deg, #FFF9ED 0%, #FFF3D6 50%, #F5E6C8 100%);
  border: 1.5px solid var(--gold);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 20px;
  position: relative;
}

.card-navi::before {
  content: '📍';
  position: absolute;
  top: -12px;
  left: 16px;
  font-size: 20px;
  background: var(--white);
  padding: 0 4px;
}

.card-navi .navi-label {
  font-size: 11px;
  color: var(--ink-light);
  letter-spacing: 2px;
  margin-bottom: 4px;
}

.card-navi .navi-poi {
  font-family: var(--font-display);
  font-size: 15px;
  font-weight: 700;
  color: var(--ink);
  margin-bottom: 6px;
}

.card-navi .navi-tip {
  font-size: 12px;
  color: var(--ink-light);
  line-height: 1.6;
  margin-bottom: 10px;
}

.navi-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  width: 100%;
  padding: 11px 20px;
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 2px;
  color: #FFF;
  background: linear-gradient(135deg, #1678FF 0%, #0D5FCF 100%);
  border: none;
  border-radius: 24px;
  cursor: pointer;
  box-shadow: 0 4px 12px rgba(22,120,255,0.35);
  transition: transform 0.15s ease, box-shadow 0.2s ease;
  -webkit-tap-highlight-color: transparent;
}

.navi-btn:active {
  transform: scale(0.96);
  box-shadow: 0 2px 6px rgba(22,120,255,0.3);
}

/* 高德标识 */
.amap-badge {
  display: inline-flex;
  align-items: center;
  gap: 3px;

/* --- 卡片操作按钮 --- */

  display: flex;
  gap: 12px;
}

  flex: 1;
  padding: 12px 16px;
  font-family: var(--font-serif);
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 2px;
  border-radius: 24px;
  border: none;
  cursor: pointer;
  transition: transform 0.15s ease;
  -webkit-tap-highlight-color: transparent;
}

.card-actions button:active {
  transform: scale(0.95);
}

.btn-redraw {
  background: transparent;
  color: var(--red);
  border: 1.5px solid var(--red) !important;
}

.btn-share {
  background: linear-gradient(135deg, var(--red) 0%, var(--red-dark) 100%);

}

/* --- 关闭按钮 --- */
.card-close {
  position: absolute;
  top: 12px;
  right: 16px;
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: rgba(0,0,0,0.15);
  border: none;
  color: var(--white);
  font-size: 16px;
  cursor: pointer;
  z-index: 101;
  display: flex;
  align-items: center;
  justify-content: center;
  -webkit-tap-highlight-color: transparent;
}

/* ============================================================
   Toast Notification
   ============================================================ */
.toast {
  position: fixed;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  z-index: 200;
  background: rgba(30,20,10,0.88);
  color: #FFF;
  font-size: 13px;
  letter-spacing: 2px;
  padding: 12px 24px;
  border-radius: 24px;
  opacity: 0;
  transition: opacity 0.3s ease, transform 0.3s ease;
  pointer-events: none;
  text-align: center;
  max-width: 85vw;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
}

.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

.toast.success {
  background: rgba(46,125,50,0.9);
}

/* ============================================================
   Poster Canvas (hidden)
   ============================================================ */
.poster-canvas {
  display: none;
}

/* ============================================================
   WeChat Hint
   ============================================================ */
.wechat-hint {
  display: none;
  position: fixed;
  top: 12px;
  right: 16px;
  z-index: 50;
  font-size: 12px;
  color: var(--ink-light);
  background: rgba(255,255,255,0.85);
  padding: 6px 12px;
  border-radius: 14px;
  letter-spacing: 1px;
  box-shadow: var(--shadow);
}

.wechat-hint.show { display: block; }

/* ============================================================
   Poster Preview Overlay
   ============================================================ */
.poster-overlay {
  position: fixed;
  inset: 0;
  z-index: 200;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s ease;
  padding: 16px;
}

.poster-overlay.active {
  opacity: 1;
  pointer-events: auto;
}

/* 半透明遮罩 */
.poster-overlay-backdrop {
  position: absolute;
  inset: 0;
  background: rgba(20,15,8,0.88);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
}

/* 内容层 */
.poster-overlay-inner {
  position: relative;
  z-index: 1;

  max-height: 92dvh;
}

  width: 100%;

  border-radius: 12px;
  box-shadow: 0 8px 40px rgba(0,0,0,0.5), 0 0 0 3px rgba(255,255,255,0.15);
  display: block;
  /* 允许微信长按弹出原生菜单 */
  -webkit-touch-callout: default;
  -webkit-user-select: auto;
  user-select: auto;
}

/* 关闭按钮 */
.poster-close {
  position: absolute;
  top: -44px;
  right: 0;
  z-index: 2;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: 1.5px solid rgba(255,255,255,0.35);
  background: rgba(0,0,0,0.45);
  color: #fff;
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  transition: background 0.2s;
}
.poster-close:active { background: rgba(255,70,31,0.7); }

/* 提示文字 */
.poster-hint {
  margin-top: 16px;
  font-size: 15px;
  color: rgba(255,255,255,0.9);
  text-align: center;
  letter-spacing: 1px;
  line-height: 1.6;
}

/* 操作按钮区 */
.poster-actions {
  margin-top: 12px;
  display: flex;
  gap: 12px;
}

.poster-btn-download {

.poster-btn-download:active {
  transform: scale(0.96);

/* ============================================================
   Footer
   ============================================================ */
.footer {
  text-align: center;
  padding: 8px 0 16px;
  font-size: 11px;
  color: var(--ink-light);
  letter-spacing: 2px;

@media (max-width: 360px) {

/** Fisher-Yates shuffle — 返回全新排序的数组 */
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

/** 获取下一个抽取的卡片，避免短期内重复 */
function getRandomCard() {
  // 过滤掉最近 MAX_HISTORY 次出现过的
  let pool = contentLibrary.filter(c => !drawHistory.includes(c.id));

  // 如果过滤后没有可用的（比如历史记录覆盖了所有），重置历史并全量使用
  if (pool.length === 0) {
    drawHistory = [];
    pool = [...contentLibrary];
  }

  const shuffled = shuffle(pool);
  const chosen = shuffled[0];

  // 更新历史
  drawHistory.push(chosen.id);
  if (drawHistory.length > MAX_HISTORY) {
    drawHistory.shift();
  }

  return chosen;
}

/** 显示 Toast */
function showToast(msg, type = '') {
  toast.textContent = msg;
  toast.className = 'toast ' + type + ' show';
  clearTimeout(toast._timeout);
  toast._timeout = setTimeout(() => {
    toast.classList.remove('show');
  }, 2500);
}

/** 检测是否为微信环境 */
function isWechat() {
  return /MicroMessenger/i.test(navigator.userAgent);
}

/** 检测是否为移动端 */
function isMobile() {
  return /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
}

/* ============================================================
   Animation — 粒子特效
   ============================================================ */

/** 释放金光粒子 */
function burstSparkles() {
  const count = 30;
  const fragment = document.createDocumentFragment();

  for (let i = 0; i < count; i++) {
    const sparkle = document.createElement('div');
    sparkle.className = 'sparkle' + (i % 3 === 0 ? ' white' : i % 3 === 1 ? ' gold' : '');

    // 随机起始位置（围绕扭蛋机中心）
    const cx = 50 + (Math.random() - 0.5) * 40; // 50% ± 20%
    const cy = 45 + (Math.random() - 0.5) * 50;
    sparkle.style.left = cx + '%';
    sparkle.style.top = cy + '%';

    // 随机运动方向
    const angle = Math.random() * Math.PI * 2;
    const dist1 = 20 + Math.random() * 40;
    const dist2 = 50 + Math.random() * 80;
    sparkle.style.setProperty('--sx', Math.cos(angle) * dist1 + 'px');
    sparkle.style.setProperty('--sy', Math.sin(angle) * dist1 - Math.random() * 30 + 'px');
    sparkle.style.setProperty('--ex', Math.cos(angle) * dist2 + 'px');
    sparkle.style.setProperty('--ey', Math.sin(angle) * dist2 - Math.random() * 40 + 'px');

    sparkle.style.animationDelay = Math.random() * 0.15 + 's';
    sparkle.style.animationDuration = (0.6 + Math.random() * 0.5) + 's';

    fragment.appendChild(sparkle);
  }

  sparkleLayer.innerHTML = '';
  sparkleLayer.appendChild(fragment);

  // 自动清理
  setTimeout(() => { sparkleLayer.innerHTML = ''; }, 1200);
}

/** 释放花瓣飘落 */
function burstPetals(count = 40) {
  const fragment = document.createDocumentFragment();

  for (let i = 0; i < count; i++) {
    const petal = document.createElement('div');
    petal.className = 'petal' + (i % 2 === 0 ? ' pink' : ' gold');

    // 随机起始位置（舞台上方分散）
    const startX = Math.random() * 100;
    petal.style.left = startX + '%';
    petal.style.top = -(5 + Math.random() * 15) + '%';

    // 随机大小
    const size = 8 + Math.random() * 16;
    petal.style.width = size + 'px';
    petal.style.height = size + 'px';

    // 随机动画参数
    petal.style.setProperty('--fall-duration', (2.5 + Math.random() * 3) + 's');
    petal.style.setProperty('--fall-delay', Math.random() * 0.8 + 's');
    petal.style.setProperty('--sway', (20 + Math.random() * 50) + 'px');

    fragment.appendChild(petal);
  }

  petalLayer.innerHTML = '';
  petalLayer.appendChild(fragment);

  // 自动清理
  setTimeout(() => { petalLayer.innerHTML = ''; }, 4000);
}

/** 扭蛋机震动效果 */
function shakeMachine() {
  gachaMachine.style.transition = 'transform 0.08s ease';
  const shakes = 8;
  let count = 0;

  const interval = setInterval(() => {
    const dx = (Math.random() - 0.5) * 10;
    const dy = (Math.random() - 0.5) * 8;
    gachaMachine.style.transform = `translate(${dx}px, ${dy}px)`;
    count++;

    if (count >= shakes) {
      clearInterval(interval);
      gachaMachine.style.transform = '';
      gachaMachine.style.transition = 'transform 0.3s ease';
    }
  }, 80);
}

         <svg viewBox="0 0 80 120" style="display:none"><use href="#ill-${p.ill}"/></svg>`
      : `<svg viewBox="0 0 80 120"><use href="#ill-${p.ill}"/></svg>`;

    return `<li>
      <div class="pose-illustration">${illHTML}</div>
      <div class="pose-text-wrap">
        <span class="pose-num">${i + 1}</span><span class="pose-desc">${p.text}</span>
      </div>
    </li>`;

  return `
    <div class="card-persona">

      <div class="mantra-text">"${data.mantra}"</div>
    </div>

    <div class="card-section">
      <div class="section-title">📍 出片机位</div>
      <div class="card-location">
        <div class="loc-detail">${data.location}</div>
        <span class="loc-tip">💡 ${data.tip}</span>
      </div>
    </div>

    <div class="card-navi">
      <div class="navi-label">高德地图 · 一键导航</div>
      <div class="navi-poi">📍 ${data.poi}</div>
      <div class="navi-tip">🗺️ 土著带路：${data.tip}</div>
      <button class="navi-btn" onclick="event.stopPropagation(); navigateTo('${data.poi.replace(/'/g, "\\'")}')">
        🚗 一键高德导航
      </button>
      <div class="amap-badge">🔵 高德地图 POI 精准导航</div>
    </div>

    <div class="card-actions">
      <button class="btn-redraw" onclick="event.stopPropagation(); handleRedraw()">
        🔄 重新抽取
      </button>
      <button class="btn-share" onclick="event.stopPropagation(); generatePoster()">
        📷 生成海报分享
      </button>
    </div>
  `;
}

/* ============================================================
   Core Interaction — 抽取
   ============================================================ */

async function handleDraw() {
  if (isAnimating) return;
  isAnimating = true;

  drawBtn.disabled = true;

  // 1. 震动扭蛋机
  shakeMachine();

  // 2. 金光闪烁
  setTimeout(() => burstSparkles(), 200);

  // 3. 花瓣飘落
  setTimeout(() => burstPetals(), 400);

  // 4. 随机抽取内容
  const data = getRandomCard();
  currentCard = data;
  totalDraws++;

  // 5. 渲染卡片
  cardContent.innerHTML = renderCard(data);

  // 6. 延迟弹出卡片（等动效进行中）
  setTimeout(() => {
    openCard();
    isAnimating = false;
    drawBtn.disabled = false;

    // 更新计数显示
    countBadge.style.display = 'block';
    drawCountEl.textContent = totalDraws;
  }, 900);
}

function handleRedraw() {
  closeCard();
  // 短暂延迟后自动重新抽取
  setTimeout(() => handleDraw(), 400);
}

/* ============================================================
   Card Modal
   ============================================================ */

function openCard() {
  cardModal.classList.add('active');
  document.body.style.overflow = 'hidden';

  // 滚动到卡片顶部
  setTimeout(() => {
    cardWrapper.scrollTop = 0;
  }, 100);
}

function closeCard() {
  cardModal.classList.remove('active');
  document.body.style.overflow = '';
}

// 点击遮罩关闭
cardModal.addEventListener('click', function(e) {
  if (e.target === cardModal) {
    closeCard();
  }
});

// ESC 关闭
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape' && cardModal.classList.contains('active')) {
    closeCard();
  }
});

/* ============================================================
   Amap Navigation — 高德地图深度集成
   ============================================================ */

function navigateTo(poiName) {
  const encodedPOI = encodeURIComponent(poiName);
  const amapURI = `https://uri.amap.com/search?keyword=${encodedPOI}&city=${encodeURIComponent('西安')}`;

  // 微信环境提示
  if (isWechat()) {
    showToast('微信内无法直接唤起高德地图，已为您复制地点名称', 'success');
    copyToClipboard(poiName, amapURI);
    return;
  }

  // 尝试唤起高德APP
  const startTime = Date.now();
  window.location.href = amapURI;

  // 降级方案：如果800ms后页面还在，说明没有唤起APP
  setTimeout(() => {
    if (Date.now() - startTime < 2000) {
      // 页面仍可见，走降级
      copyToClipboard(poiName, amapURI);
    }
  }, 800);
}

function copyToClipboard(poiName, amapURI) {
  // 优先使用 Clipboard API
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(poiName).then(() => {
      showToast(`已复制「${poiName}」，请打开高德地图APP搜索导航`, 'success');
    }).catch(() => {
      fallbackCopy(poiName);
    });
  } else {
    fallbackCopy(poiName);
  }
}

/** 降级复制方案：创建临时textarea */
function fallbackCopy(text) {
  const textarea = document.createElement('textarea');
  textarea.value = text;
  textarea.style.position = 'fixed';
  textarea.style.left = '-9999px';
  textarea.style.top = '-9999px';
  document.body.appendChild(textarea);
  textarea.focus();
  textarea.select();

  try {
    document.execCommand('copy');
    showToast(`已复制「${text}」，请打开高德地图APP搜索导航`, 'success');
  } catch (err) {
    showToast('复制失败，请手动搜索：' + text);
  }

  document.body.removeChild(textarea);
}

/* ============================================================
   Poster Generation — Canvas 海报生成
   ============================================================ */

function generatePoster() {
  if (!currentCard) return;

  const canvas = posterCanvas;
  const ctx = canvas.getContext('2d');

  const W = canvas.width;   // 750
  const H = canvas.height;  // 1334

  // Clear
  ctx.clearRect(0, 0, W, H);

  // --- Background (rice paper) ---
  ctx.fillStyle = '#FFFEF9';
  ctx.fillRect(0, 0, W, H);

  // Paper texture
  ctx.fillStyle = 'rgba(212,168,75,0.03)';
  for (let i = 0; i < 200; i++) {
    const x = Math.random() * W;
    const y = Math.random() * H;
    const r = Math.random() * 3 + 1;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fill();
  }

  // --- Top decorative bar ---
  const topGrad = ctx.createLinearGradient(80, 0, W - 80, 0);
  topGrad.addColorStop(0, 'rgba(255,70,31,0)');
  topGrad.addColorStop(0.2, '#FF461F');
  topGrad.addColorStop(0.5, '#FFB61E');
  topGrad.addColorStop(0.8, '#FF461F');
  topGrad.addColorStop(1, 'rgba(255,70,31,0)');
  ctx.fillStyle = topGrad;
  ctx.fillRect(80, 40, W - 160, 4);

  // --- Title ---
  ctx.fillStyle = '#FF461F';
  ctx.font = 'bold 48px "Noto Serif SC", "STSong", "KaiTi", serif';
  ctx.textAlign = 'center';
  ctx.fillText('长安汉服出片扭蛋机', W / 2, 120);

  ctx.fillStyle = '#6B5A4E';
  ctx.font = '24px "Noto Serif SC", "STSong", "KaiTi", serif';
  ctx.fillText('穿汉服 · 游长安 · 出大片', W / 2, 160);

  // --- Divider ---
  ctx.strokeStyle = '#D4A84B';
  ctx.lineWidth = 1;
  ctx.setLineDash([8, 6]);
  ctx.beginPath();
  ctx.moveTo(W / 2 - 120, 180);
  ctx.lineTo(W / 2 + 120, 180);
  ctx.stroke();
  ctx.setLineDash([]);

  // --- Persona ---
  let yPos = 240;

  // Diamond decorations
  ctx.fillStyle = '#D4A84B';
  ctx.font = '16px serif';
  ctx.fillText('◆', W / 2 - 140, yPos + 18);
  ctx.fillText('◆', W / 2 + 130, yPos + 18);

  // Persona label with border
  const personaText = currentCard.persona;
  ctx.font = 'bold 56px "Noto Serif SC", "STSong", "KaiTi", serif';
  const personaWidth = ctx.measureText(personaText).width;
  const boxW = personaWidth + 80;
  const boxH = 80;
  const boxX = (W - boxW) / 2;
  const boxY = yPos - 55;

  ctx.fillStyle = 'rgba(255,70,31,0.06)';
  ctx.fillRect(boxX, boxY, boxW, boxH);
  ctx.strokeStyle = '#FF461F';
  ctx.lineWidth = 3;
  ctx.strokeRect(boxX, boxY, boxW, boxH);

  ctx.fillStyle = '#FF461F';
  ctx.fillText(personaText, W / 2, yPos);

  // Role tag
  yPos += 36;
  ctx.fillStyle = '#D4A84B';
  ctx.font = '20px "Noto Serif SC", "STSong", "KaiTi", serif';
  ctx.fillText(currentCard.roleTag, W / 2, yPos);

  // --- Poses Section ---
  yPos += 60;
  ctx.fillStyle = '#D4A84B';
  ctx.font = 'bold 28px "Noto Serif SC", "STSong", "KaiTi", serif';
  ctx.textAlign = 'left';
  ctx.fillText('📸 出片姿势', 80, yPos);

  ctx.strokeStyle = '#D4A84B';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(260, yPos - 8);
  ctx.lineTo(W - 80, yPos - 8);
  ctx.stroke();

  yPos += 20;
  ctx.fillStyle = '#3D2B1F';
  ctx.font = '24px "Noto Serif SC", "STSong", "KaiTi", serif';

  currentCard.poses.forEach((pose, i) => {
    yPos += 52;

    // Illustration frame
    const illX = 80, illY = yPos - 10, illW = 70, illH = 90;

    // Draw pre-rendered illustration from offscreen cache
    const cachedCanvas = illCache[pose.ill];
    if (cachedCanvas && cachedCanvas.width > 0) {
      ctx.drawImage(cachedCanvas, illX, illY, illW, illH);
    } else {
      // Fallback: colored frame with pose type label
      ctx.fillStyle = '#F5F0E8';
      ctx.fillRect(illX, illY, illW, illH);
      ctx.strokeStyle = 'rgba(212,168,75,0.4)';
      ctx.lineWidth = 1.5;
      ctx.strokeRect(illX, illY, illW, illH);
      const illNames = { lookback:'回眸', sidestand:'侧立', sit:'端坐', umbrella:'执伞', lean:'倚靠', squat:'蹲姿', fan:'持扇', walk:'行步', lookup:'仰首', bow:'低眉' };
      ctx.fillStyle = '#D4A84B';
      ctx.font = '16px "Noto Serif SC", serif';
      ctx.textAlign = 'center';
      ctx.fillText(illNames[pose.ill] || '', illX + illW/2, illY + illH/2 + 6);
      ctx.textAlign = 'left';
    }

    // Pose type label overlay on illustration
    const illNames = { lookback:'回眸', sidestand:'侧立', sit:'端坐', umbrella:'执伞', lean:'倚靠', squat:'蹲姿', fan:'持扇', walk:'行步', lookup:'仰首', bow:'低眉' };
    ctx.fillStyle = 'rgba(255,255,255,0.75)';
    ctx.fillRect(illX + 2, illY + illH - 18, illW - 4, 16);
    ctx.fillStyle = '#3D2B1F';
    ctx.font = 'bold 11px "Noto Serif SC", serif';
    ctx.textAlign = 'center';
    ctx.fillText(illNames[pose.ill] || '', illX + illW/2, illY + illH - 6);
    ctx.textAlign = 'left';

    // Number circle
    ctx.fillStyle = '#FF461F';
    ctx.beginPath();
    ctx.arc(170, yPos, 14, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#FFF';
    ctx.font = 'bold 16px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(i + 1, 170, yPos + 5);
    ctx.textAlign = 'left';

    // Pose text
    ctx.fillStyle = '#3D2B1F';
    ctx.font = '24px "Noto Serif SC", "STSong", "KaiTi", serif';
    const words = pose.text;
    const maxWidth = W - 210;
    const lines = wrapText(ctx, words, maxWidth);
    lines.forEach((line, li) => {
      ctx.fillText(line, 200, yPos + li * 34);
    });
    yPos += (lines.length - 1) * 34;
  });

  // --- Mantra ---
  yPos += 50;
  ctx.fillStyle = 'rgba(255,70,31,0.06)';
  ctx.fillRect(80, yPos - 10, W - 160, 70);
  ctx.fillStyle = '#FF461F';
  ctx.strokeStyle = '#FF461F';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(80, yPos - 10);
  ctx.lineTo(80, yPos + 60);
  ctx.stroke();

  ctx.fillStyle = '#6B5A4E';
  ctx.font = '18px "Noto Serif SC", "STSong", "KaiTi", serif';
  ctx.textAlign = 'center';
  ctx.fillText('— 情绪口诀 —', W / 2, yPos + 12);

  ctx.fillStyle = '#D93A16';
  ctx.font = 'bold 32px "Noto Serif SC", "STSong", "KaiTi", serif';
  ctx.fillText('"' + currentCard.mantra + '"', W / 2, yPos + 48);

  // --- Location ---
  yPos += 100;
  ctx.fillStyle = '#D4A84B';
  ctx.font = 'bold 28px "Noto Serif SC", "STSong", "KaiTi", serif';
  ctx.textAlign = 'left';
  ctx.fillText('📍 出片机位', 80, yPos);

  yPos += 36;
  ctx.fillStyle = '#3D2B1F';
  ctx.font = '24px "Noto Serif SC", "STSong", "KaiTi", serif';
  const locLines = wrapText(ctx, currentCard.location, W - 160);
  locLines.forEach((line, i) => {
    ctx.fillText(line, 80, yPos + i * 36);
  });
  yPos += locLines.length * 36 + 8;

  ctx.fillStyle = '#6B5A4E';
  ctx.font = '20px "Noto Serif SC", "STSong", "KaiTi", serif';
  ctx.fillText('💡 ' + currentCard.tip, 80, yPos);

  // --- Navi Section ---
  yPos += 60;
  ctx.fillStyle = '#FFF9ED';
  ctx.fillRect(80, yPos, W - 160, 120);
  ctx.strokeStyle = '#D4A84B';
  ctx.lineWidth = 1.5;
  ctx.strokeRect(80, yPos, W - 160, 120);

  ctx.fillStyle = '#6B5A4E';
  ctx.font = '18px "Noto Serif SC", "STSong", "KaiTi", serif';
  ctx.fillText('高德地图 · 精准导航', W / 2, yPos + 30);

  ctx.fillStyle = '#3D2B1F';
  ctx.font = 'bold 26px "Noto Serif SC", "STSong", "KaiTi", serif';
  ctx.fillText('📍 ' + currentCard.poi, W / 2, yPos + 60);

  ctx.fillStyle = '#1678FF';
  ctx.font = '22px "Noto Serif SC", "STSong", "KaiTi", serif';
  ctx.fillText('打开高德地图搜索上方地点', W / 2, yPos + 95);

  // --- Footer ---
  yPos += 180;
  ctx.fillStyle = '#D4A84B';
  ctx.font = '20px "Noto Serif SC", "STSong", "KaiTi", serif';
  ctx.textAlign = 'center';
  ctx.fillText('🏮 长安十二时辰 · 你的大唐时刻 🏮', W / 2, yPos);

  ctx.fillStyle = '#6B5A4E';
  ctx.font = '16px "Noto Serif SC", "STSong", "KaiTi", serif';
  ctx.fillText('扫码体验更多人设 →', W / 2, yPos + 36);

  // --- Bottom divider ---
  const bottomGrad = ctx.createLinearGradient(80, 0, W - 80, 0);
  bottomGrad.addColorStop(0, 'rgba(255,70,31,0)');
  bottomGrad.addColorStop(0.2, '#FF461F');
  bottomGrad.addColorStop(0.5, '#FFB61E');
  bottomGrad.addColorStop(0.8, '#FF461F');
  bottomGrad.addColorStop(1, 'rgba(255,70,31,0)');
  ctx.fillStyle = bottomGrad;
  ctx.fillRect(80, yPos + 56, W - 160, 3);

  // --- Export ---
  canvas.toBlob(function(blob) {
    const url = URL.createObjectURL(blob);

    // 展示海报预览浮层（微信内可长按保存/分享到朋友圈/发送给朋友）
    openPoster(url);

    // 设置下载按钮
    posterDownload.onclick = function() {
      triggerDownload(url);
    };

  }, 'image/jpeg', 0.9);
}

/** 打开海报预览浮层 */
function openPoster(url) {
  // 清理上一次的 blob URL（如果用户连续生成海报）
  if (currentPosterUrl) {
    URL.revokeObjectURL(currentPosterUrl);
  }
  currentPosterUrl = url;

  posterPreview.src = url;
  posterOverlay.classList.add('active');
  document.body.style.overflow = 'hidden';

  // 根据环境显示不同提示
  if (isWechat()) {
    posterHint.innerHTML = '👆 <b>长按上方图片</b><br>发送给朋友 / 保存到相册 / 分享到朋友圈';
  } else {
    posterHint.innerHTML = '👆 <b>长按图片</b> 保存到相册<br>或点击下方按钮下载';
  }
}

/** 关闭海报预览浮层 */
function closePoster() {
  posterOverlay.classList.remove('active');
  document.body.style.overflow = '';
  // 延迟清理 blob URL，确保图片已渲染
  if (currentPosterUrl) {
    const url = currentPosterUrl;
    setTimeout(function() { URL.revokeObjectURL(url); }, 300);
    currentPosterUrl = null;
  }
}

// 点击遮罩关闭
posterBackdrop.addEventListener('click', closePoster);
// 关闭按钮
posterCloseBtn.addEventListener('click', closePoster);

/** Canvas文本自动换行 */
function wrapText(ctx, text, maxWidth) {
  const lines = [];
  let currentLine = '';

  for (let i = 0; i < text.length; i++) {
    const char = text[i];
    const testLine = currentLine + char;
    const metrics = ctx.measureText(testLine);

    if (metrics.width > maxWidth && currentLine.length > 0) {
      lines.push(currentLine);
      currentLine = char;
    } else {
      currentLine = testLine;
    }
  }

  if (currentLine.length > 0) {
    lines.push(currentLine);
  }

  return lines;
}

function triggerDownload(url) {
  const a = document.createElement('a');
  a.href = url;
  a.download = '长安汉服出片_' + (currentCard ? currentCard.persona : '海报') + '.jpg';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 5000);
}

/* ============================================================
   Illustration Pre-Rendering for Canvas Poster
   ============================================================ */

function preRenderIllustrations() {
  const illKeys = ['lookback','sidestand','sit','umbrella','lean','squat','fan','walk','lookup','bow'];
  const hiddenSvg = document.querySelector('svg[aria-hidden="true"]');

  illKeys.forEach(key => {
    const symbolEl = hiddenSvg.querySelector('#ill-' + key);
    if (!symbolEl) return;

    // Create offscreen canvas at 2x for retina quality
    const c = document.createElement('canvas');
    c.width = 140;   // 2x the poster target (70px)
    c.height = 180;  // 2x the poster target (90px)
    const cx = c.getContext('2d');

    // Serialize SVG symbol to standalone data URI
    const svgMarkup = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 120" width="140" height="180">'
      + symbolEl.innerHTML
      + '</svg>';
    const dataUri = 'data:image/svg+xml,' + encodeURIComponent(svgMarkup);

    // Draw to offscreen canvas
    const img = new Image();
    img.onload = () => {
      cx.drawImage(img, 0, 0, 140, 180);
      illCache[key] = c;
    };
    img.src = dataUri;
  });
}

function loadAndDrawImage(url, ctx, x, y, w, h, canvas) {
  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = () => {
    ctx.drawImage(img, x, y, w, h);
  };
  img.onerror = () => { /* SVG fallback already drawn */ };
  img.src = url;
}

/* ============================================================
   Initialization
   ============================================================ */

function init() {
  // Pre-render SVG illustrations for poster canvas
  preRenderIllustrations();

  // 微信环境显示提示
  if (isWechat()) {
    wechatHint.classList.add('show');
  }

  // 预渲染第一组内容（用于展示效果，但不自动弹出）
  const preview = contentLibrary[Math.floor(Math.random() * contentLibrary.length)];
  cardContent.innerHTML = renderCard(preview);

  console.log('🏮 长安汉服出片扭蛋机 已就绪');
  console.log('📚 已加载 ' + contentLibrary.length + ' 组大唐人设');
  console.log('📍 所有POI均为高德地图真实可查标准名称');
}

// 启动
init();
</script>
